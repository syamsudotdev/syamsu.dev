name: Generate OG Images

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'scripts/og-template.html'
  workflow_dispatch:

jobs:
  generate:
    name: Generate OG images
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: og-images
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        name: Install pnpm

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pw-browsers-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate OG images
        run: |
          rm -rf playwright/screenshots
          pnpm exec playwright test tests/og-images.spec.ts

      - name: Move generated images into place
        run: |
          rm -rf public/meta
          mkdir -p public/meta
          mv playwright/screenshots/* public/meta/

      - name: Create or update PR
        uses: peter-evans/create-pull-request@d4f3be6ce6f4083b7ac7490ab98b48a62db1ee41 # v7.0.10
        with:
          token: ${{ github.token }}
          branch: og-images/auto-generate
          delete-branch: true
          title: 'Generate OG images'
          body: |
            Auto-generated OG images from `scripts/og-template.html` and post frontmatter.

            Triggered by push to main that modified posts or the OG template.
          labels: og-images
          commit-message: 'meta: regenerate OG images'
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
